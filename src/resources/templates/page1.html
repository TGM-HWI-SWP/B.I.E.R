<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('stylesheet', filename=selected_theme) }}">
    <title>B.I.E.R – Produktbearbeitung</title>
</head>
<body class="page-product">
    <header class="topbar">
        <div class="topbar-inner">
            <nav class="tabs" aria-label="Page Auswahl">
                <a class="tab" href="{{ url_for('index', theme=selected_theme) }}">Produkte</a>
                <a class="tab" href="{{ url_for('page1', theme=selected_theme) }}" aria-current="page">Produkt bearbeiten</a>
                <a class="tab" href="{{ url_for('page2', theme=selected_theme) }}">Lagerliste</a>
                <a class="tab" href="{{ url_for('page3', theme=selected_theme) }}">Statistik</a>
                <a class="tab" href="{{ url_for('page4', theme=selected_theme) }}">Historie</a>
                <span class="tab is-disabled" aria-disabled="true" title="Noch nicht implementiert">Reports</span>
            </nav>

            <form class="theme-switcher" method="get" action="{{ request.path }}" aria-label="Stylesheet auswählen">
                <label class="theme-label" for="themeSelect">Style</label>
                <select id="themeSelect" class="theme-select" name="theme" onchange="this.form.submit()">
                    {% for theme in theme_options %}
                    <option value="{{ theme }}" {% if theme == selected_theme %}selected{% endif %}>{{ theme[:-4] }}</option>
                    {% endfor %}
                </select>
                <noscript><button class="btn btn-small" type="submit">Anwenden</button></noscript>
            </form>
        </div>
    </header>

    <main class="container">
        <section class="product-header" aria-label="Produktkopf">
            <a class="back" href="{{ url_for('index', theme=selected_theme) }}" aria-label="Zurück zu Page 1" title="Zurück">
                <span aria-hidden="true">←</span>
            </a>
            <h1 class="product-title">Produkt bearbeiten</h1>
            <div aria-hidden="true"></div>
        </section>

        <section class="card" aria-label="Produkt bearbeiten">
            <div class="card-header">
                <small>Änderungen werden direkt in der PostgreSQL-Datenbank gespeichert.</small>
            </div>

            <form id="productForm">
                <div class="fields">
                    <div class="field">
                        <div class="label">Bestehendes Produkt</div>
                        <select id="existingProduct" aria-label="Produkt auswählen">
                            <option value="">Neues Produkt</option>
                        </select>
                    </div>

                    <div class="field">
                        <div class="label">Produktname</div>
                        <input id="productName" type="text" placeholder="z.B. Papier A4" required />
                    </div>

                    <div class="field">
                        <div class="label">Beschreibung</div>
                        <input id="productDescription" type="text" placeholder="z.B. 500 Blatt" />
                    </div>

                    <div class="field">
                        <div class="label">Gewicht</div>
                        <input id="productWeight" type="number" min="0.01" step="0.01" placeholder="z.B. 1.2" required />
                    </div>
                </div>

                <div class="fields">
                    <div class="field">
                        <div class="label">Lager</div>
                        <select id="warehouseSelect" aria-label="Lager auswählen">
                            <option value="">Lager wählen</option>
                        </select>
                    </div>

                    <div class="field">
                        <div class="label">Menge</div>
                        <input id="warehouseQuantity" type="number" min="1" step="1" value="1" />
                    </div>
                </div>

                <div class="toolbar" aria-label="Aktionen">
                    <button class="btn" id="createProductBtn" type="button">Produkt anlegen</button>
                    <button class="btn" id="updateProductBtn" type="button">Produkt speichern</button>
                    <button class="btn" id="assignWarehouseBtn" type="button">In Lager buchen</button>
                    <button class="btn" id="deleteProductBtn" type="button">Produkt löschen</button>
                </div>
            </form>
            <div class="card-header"><small id="page1Status">Bereit.</small></div>
        </section>
    </main>

    <script src="{{ url_for('app_script') }}"></script>
</body>
</html>
