<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('stylesheet', filename=selected_theme) }}">
    <title>B.I.E.R – Produktbearbeitung</title>
</head>
<body class="page-product">
    <header class="topbar">
        <div class="topbar-inner">
            <nav class="tabs" aria-label="Page Auswahl">
                <a class="tab" href="{{ url_for('index', theme=selected_theme) }}">Produkte</a>
                <a class="tab" href="{{ url_for('page1', theme=selected_theme) }}" aria-current="page">Produkt bearbeiten</a>
                <a class="tab" href="{{ url_for('page2', theme=selected_theme) }}">Lagerliste</a>
                <a class="tab" href="{{ url_for('page3', theme=selected_theme) }}">Statistik</a>
                <span class="tab is-disabled" aria-disabled="true" title="Noch nicht implementiert">Historie</span>
                <span class="tab is-disabled" aria-disabled="true" title="Noch nicht implementiert">Reports</span>
            </nav>

            <form class="theme-switcher" method="get" action="{{ request.path }}" aria-label="Stylesheet auswählen">
                <label class="theme-label" for="themeSelect">Style</label>
                <select id="themeSelect" class="theme-select" name="theme" onchange="this.form.submit()">
                    {% for theme in theme_options %}
                    <option value="{{ theme }}" {% if theme == selected_theme %}selected{% endif %}>{{ theme[:-4] }}</option>
                    {% endfor %}
                </select>
                <noscript><button class="btn btn-small" type="submit">Anwenden</button></noscript>
            </form>
        </div>
    </header>

    <main class="container">
        <section class="product-header" aria-label="Produktkopf">
            <a class="back" href="{{ url_for('index', theme=selected_theme) }}" aria-label="Zurück zu Page 1" title="Zurück">
                <span aria-hidden="true">←</span>
            </a>
            <h1 class="product-title">Produkt (1)</h1>
            <div aria-hidden="true"></div>
        </section>

        <section class="card" aria-label="Produkt bearbeiten">
            <div class="card-header">
                <small>Default-Attribute wie Lager und ID bleiben immer vorhanden (UI-Demo).</small>
            </div>

            <form>
                <div class="fields">
                    <div class="field">
                        <div class="label">Lager</div>
                        <select aria-label="Lager auswählen">
                            <option>Hauptlager Wien</option>
                            <option>Nebenlager Graz</option>
                            <option>Außenlager Linz</option>
                            <option>Kühllager Salzburg</option>
                            <option>Depot Innsbruck</option>
                        </select>
                    </div>

                    <div class="field">
                        <div class="label">Menge</div>
                        <input type="number" min="0" step="1" value="0" />
                    </div>

                    <div class="field">
                        <div class="label">ID</div>
                        <input type="text" value="1" readonly />
                    </div>

                    <div class="field">
                        <div class="label">Preis</div>
                        <input type="text" placeholder="z.B. 12.99" />
                    </div>

                    <div class="field">
                        <div class="label">Währung</div>
                        <input type="text" placeholder="z.B. EUR" />
                    </div>

                    <div class="field">
                        <div class="label">Lieferant</div>
                        <input type="text" placeholder="z.B. Firma X" />
                    </div>
                </div>

                <div class="toolbar" aria-label="Aktionen">
                    <button class="btn" type="button">Save changes</button>
                    <button class="btn" type="button">Discard changes</button>
                    <button class="btn" type="button">Revert changes</button>
                    <button class="btn" type="button">Add attribute</button>
                    <button class="btn" type="button" disabled>Delete attribute</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
