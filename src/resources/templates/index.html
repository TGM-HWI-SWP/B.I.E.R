<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('stylesheet', filename=selected_theme) }}">
    <title>B.I.E.R – Produktverwaltung</title>
</head>
<body class="page-index">
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand-logo" href="{{ url_for('index', theme=selected_theme) }}" aria-label="Startseite">
                <img src="{{ url_for('picture', filename='BIER_LOGO_SCHWARZ_COMPRESSED.png') }}" alt="B.I.E.R Logo" />
            </a>
            <nav class="tabs" aria-label="Page Auswahl">
                <a class="tab" href="{{ url_for('index', theme=selected_theme) }}" aria-current="page">Produkte</a>
                <a class="tab" href="{{ url_for('page1', theme=selected_theme) }}">Produkt bearbeiten</a>
                <a class="tab" href="{{ url_for('page2', theme=selected_theme) }}">Lagerliste</a>
                <a class="tab" href="{{ url_for('page3', theme=selected_theme) }}">Statistik</a>
                <a class="tab" href="{{ url_for('page4', theme=selected_theme) }}">Historie</a>
                <a class="tab" href="{{ url_for('page6', theme=selected_theme) }}">Reports</a>
            </nav>

            <form class="theme-switcher" method="get" action="{{ request.path }}" aria-label="Stylesheet auswählen">
                <label class="theme-label" for="themeSelect">Style</label>
                <select id="themeSelect" class="theme-select" name="theme" onchange="this.form.submit()">
                    {% for theme in theme_options %}
                    <option value="{{ theme }}" {% if theme == selected_theme %}selected{% endif %}>{{ theme[:-4] }}</option>
                    {% endfor %}
                </select>
                <noscript><button class="btn btn-small" type="submit">Anwenden</button></noscript>
            </form>
        </div>
    </header>

    <main class="container">
        <div class="title-row">
            <h1 class="page-title">Produktverwaltung</h1>
            <a class="add-button" href="{{ url_for('page1', theme=selected_theme) }}" aria-label="Neues Produkt anlegen" title="Neues Produkt anlegen">
                <span class="sr-only">Neues Produkt anlegen</span>
            </a>
        </div>

        <section class="search-row" aria-label="Produktverwaltung">
            <div class="search-wrap">
                <label class="search-label" for="productSearch">Produktsuche</label>
                <input
                    id="productSearch"
                    class="search-input"
                    type="search"
                    inputmode="search"
                    autocomplete="off"
                    placeholder="Produkte durchsuchen …"
                    aria-describedby="searchHint"
                />
                <div id="searchHint" class="search-hint">Produkte werden live aus der Datenbank geladen.</div>
            </div>
        </section>

        <section class="results" aria-label="Ergebnisliste">
            <div class="results-inner">
                <div class="table-wrap" role="region" aria-label="Tabelle: Produkte" tabindex="0">
                    <table>
                        <colgroup>
                            <col class="col-id" />
                            <col class="col-name" />
                            <col class="col-description" />
                            <col class="col-weight" />
                            <col class="col-action" />
                        </colgroup>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Beschreibung</th>
                                <th>Gewicht</th>
                                <th>Aktion</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody"></tbody>
                    </table>
                </div>
                <div class="results-note" id="productsStatus">Lade Produkte ...</div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('app_script') }}"></script>
</body>
</html>
