<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('stylesheet', filename=selected_theme) }}">
    <title>B.I.E.R – Produktverwaltung</title>
</head>
<body class="page-index">
    <header class="topbar">
        <div class="topbar-inner">
            <nav class="tabs" aria-label="Page Auswahl">
                <a class="tab" href="{{ url_for('index', theme=selected_theme) }}" aria-current="page">Produkte</a>
                <a class="tab" href="{{ url_for('page1', theme=selected_theme) }}">Produkt bearbeiten</a>
                <a class="tab" href="{{ url_for('page2', theme=selected_theme) }}">Lagerliste</a>
                <a class="tab" href="{{ url_for('page3', theme=selected_theme) }}">Statistik</a>
            <span class="tab is-disabled" aria-disabled="true" title="Noch nicht implementiert">Historie</span>
            <span class="tab is-disabled" aria-disabled="true" title="Noch nicht implementiert">Reports</span>
            </nav>

            <form class="theme-switcher" method="get" action="{{ request.path }}" aria-label="Stylesheet auswählen">
                <label class="theme-label" for="themeSelect">Style</label>
                <select id="themeSelect" class="theme-select" name="theme" onchange="this.form.submit()">
                    {% for theme in theme_options %}
                    <option value="{{ theme }}" {% if theme == selected_theme %}selected{% endif %}>{{ theme[:-4] }}</option>
                    {% endfor %}
                </select>
                <noscript><button class="btn btn-small" type="submit">Anwenden</button></noscript>
            </form>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Produktverwaltung</h1>

        <section class="search-row" aria-label="Produktverwaltung">
            <a class="add-button" href="{{ url_for('page1') }}" aria-label="Neues Produkt anlegen" title="Neues Produkt anlegen">
                <span class="sr-only">Neues Produkt anlegen</span>
            </a>

            <div class="search-wrap">
                <label class="search-label" for="productSearch">Produktsuche</label>
                <input
                    id="productSearch"
                    class="search-input"
                    type="search"
                    inputmode="search"
                    autocomplete="off"
                    placeholder="Produkte durchsuchen …"
                    aria-describedby="searchHint"
                />
                <div id="searchHint" class="search-hint">Suche ist aktuell nur UI (noch keine Datenquelle).</div>
            </div>
        </section>

        <section class="results" aria-label="Ergebnisliste">
            <div class="results-inner">
                <div class="results-placeholder" aria-hidden="true"></div>
                <div class="results-note">Hier kommt später die Liste/Ansicht der angelegten Produkte hin.</div>
            </div>
        </section>
    </main>
</body>
</html>
