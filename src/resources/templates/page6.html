<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link rel="stylesheet" href="{{ url_for('stylesheet', filename=selected_theme) }}">
    <title>B.I.E.R – Reports</title>
</head>
<body class="page-reports">
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand-logo" href="{{ url_for('index', theme=selected_theme) }}" aria-label="Startseite">
                <img src="{{ url_for('picture', filename='BIER_ICON_COMPRESSED.png') }}" alt="B.I.E.R Logo" />
            </a>
            <nav class="tabs" aria-label="Page Auswahl">
                <a class="tab" href="{{ url_for('index', theme=selected_theme) }}">Produkte</a>
                <a class="tab" href="{{ url_for('page1', theme=selected_theme) }}">Produkt bearbeiten</a>
                <a class="tab" href="{{ url_for('page2', theme=selected_theme) }}">Lagerliste</a>
                <a class="tab" href="{{ url_for('page3', theme=selected_theme) }}">Statistik</a>
                <a class="tab" href="{{ url_for('page4', theme=selected_theme) }}">Historie</a>
                <a class="tab" href="{{ url_for('page6', theme=selected_theme) }}" aria-current="page">Reports</a>
            </nav>

            <form class="theme-switcher" method="get" action="{{ request.path }}" aria-label="Stylesheet auswählen">
                <details class="settings-menu">
                    <summary class="settings-trigger" aria-label="Einstellungen öffnen" title="Einstellungen">⚙</summary>
                    <div class="settings-panel">
                        <div class="settings-field">
                            <label class="theme-label" for="themeSelect">Design</label>
                            <select id="themeSelect" class="theme-select" name="theme" onchange="this.form.submit()">
                                {% for theme in theme_options %}
                                <option value="{{ theme }}" {% if theme == selected_theme %}selected{% endif %}>{{ theme_labels.get(theme, theme) }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="settings-field">
                            <label class="theme-label" for="densitySelect">Dichte</label>
                            <select id="densitySelect" class="theme-select" name="density" onchange="this.form.submit()">
                                <option value="normal">Normal</option>
                                <option value="compact">Kompakt</option>
                            </select>
                        </div>
                        <div class="settings-field">
                            <label class="theme-label" for="textScaleSelect">Schrift</label>
                            <select id="textScaleSelect" class="theme-select" name="text_scale" onchange="this.form.submit()">
                                <option value="normal">Standard</option>
                                <option value="large">Groß</option>
                            </select>
                        </div>
                        <noscript><button class="btn btn-small" type="submit">Anwenden</button></noscript>
                    </div>
                </details>
            </form>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Reports</h1>

        <section class="card reports-card" aria-label="Report Aktionen">
            <div class="card-header">
                <p class="note">Für jeden Report gibt es Vorschau und Download als PDF.</p>
            </div>

            <div class="reports-grid">
                <article class="report-item" aria-label="Report A Aktionen">
                    <h2>Report A</h2>
                    <p class="note">Historie und Bestandsbewegungen.</p>
                    <div class="report-actions">
                        <button class="btn" type="button" data-report-preview="a">Preview</button>
                        <button class="btn" type="button" data-report-download="a">Download</button>
                    </div>
                </article>

                <article class="report-item" aria-label="Report B Aktionen">
                    <h2>Report B</h2>
                    <p class="note">Lagerauslastung und Kapazitäten.</p>
                    <div class="report-actions">
                        <button class="btn" type="button" data-report-preview="b">Preview</button>
                        <button class="btn" type="button" data-report-download="b">Download</button>
                    </div>
                </article>
            </div>

            <div class="report-preview" aria-label="PDF Vorschau">
                <div class="preview-top">
                    <strong id="reportsPreviewTitle">Preview</strong>
                    <small id="reportsPreviewStatus">Bitte einen Report für die Vorschau auswählen.</small>
                </div>
                <div id="reportPreviewPages" class="report-preview-pages" aria-label="PDF Seitenvorschau"></div>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="{{ url_for('app_script') }}"></script>
</body>
</html>
