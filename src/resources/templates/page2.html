<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" href="/favicon.ico">
	<link rel="stylesheet" href="{{ url_for('stylesheet', filename=selected_theme) }}">
	<title>B.I.E.R – Lagerliste</title>
</head>
<body class="page-warehouse">
	<header class="topbar">
		<div class="topbar-inner">
			<a class="brand-logo" href="{{ url_for('index', theme=selected_theme) }}" aria-label="Startseite">
				<img src="{{ url_for('picture', filename='BIER_ICON_COMPRESSED.png') }}" alt="B.I.E.R Logo" />
			</a>
			<nav class="tabs" aria-label="Page Auswahl">
				<a class="tab" href="{{ url_for('index', theme=selected_theme) }}">Produkte</a>
				<a class="tab" href="{{ url_for('page1', theme=selected_theme) }}">Produkt bearbeiten</a>
				<a class="tab" href="{{ url_for('page2', theme=selected_theme) }}" aria-current="page">Lagerliste</a>
				<a class="tab" href="{{ url_for('page3', theme=selected_theme) }}">Statistik</a>
				<a class="tab" href="{{ url_for('page4', theme=selected_theme) }}">Historie</a>
				<a class="tab" href="{{ url_for('page6', theme=selected_theme) }}">Reports</a>
			</nav>

			<form class="theme-switcher" method="get" action="{{ request.path }}" aria-label="Stylesheet auswählen">
				<details class="settings-menu">
					<summary class="settings-trigger" aria-label="Einstellungen öffnen" title="Einstellungen">⚙</summary>
					<div class="settings-panel">
						<label class="theme-label" for="themeSelect">Style</label>
						<select id="themeSelect" class="theme-select" name="theme" onchange="this.form.submit()">
							{% for theme in theme_options %}
							<option value="{{ theme }}" {% if theme == selected_theme %}selected{% endif %}>{{ theme[:-4] }}</option>
							{% endfor %}
						</select>
						<noscript><button class="btn btn-small" type="submit">Anwenden</button></noscript>
					</div>
				</details>
			</form>
		</div>
	</header>

	<main class="container">
		<h1 class="page-title">Lager Liste</h1>

		<section class="card" aria-label="Lagerliste">
			<div class="card-header">
				<p class="note">Übersicht aller angelegten Lager aus der PostgreSQL-Datenbank. Ein Klick auf ein Lager öffnet die Produktverwaltung.</p>
			</div>

			<div class="create" aria-label="Lager erstellen">
				<label>
					Lagername
					<input id="warehouseName" type="text" placeholder="z.B. Ersatzteillager" />
				</label>
				<label>
					Ort
					<input id="warehouseAddress" type="text" placeholder="z.B. Wien" />
				</label>
				<label>
					Kapazität (max. Produkte)
					<input id="warehouseCapacity" type="number" min="1" step="1" placeholder="z.B. 500" />
				</label>
				<div class="create-actions">
					<button class="btn" id="createWarehouseBtn" type="button">Lager erstellen</button>
				</div>
			</div>

			<div class="warehouse-search" aria-label="Lager suchen">
				<label for="warehouseSearch">Lager suchen</label>
				<input id="warehouseSearch" type="search" placeholder="Nach Lagername, Ort oder Lager-ID suchen ..." />
			</div>

			<div class="table-wrap" role="region" aria-label="Tabelle: Lager" tabindex="0">
				<table>
					<thead>
						<tr>
							<th class="col-warehouse">Lager</th>
							<th>Lager-ID</th>
							<th class="col-location">Ort</th>
							<th class="col-products">Produkte</th>
							<th class="col-capacity">Kapazität</th>
							<th class="col-utilization">Auslastung</th>
							<th class="col-action">Aktion</th>
						</tr>
					</thead>
					<tbody id="warehousesTableBody"></tbody>
				</table>
			</div>
			<div class="card-header"><p class="note" id="warehousesStatus">Lade Lager ...</p></div>
		</section>
	</main>

	<script src="{{ url_for('app_script') }}"></script>
</body>
</html>
