services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: bierapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lagerverwaltung
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin (Web-UI für PostgreSQL) ─────────────────────
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: bierapp-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: secret
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ─── Flask-App ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bierapp-flask
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: lagerverwaltung
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: "false"
    ports:
      - "5000:5000"
    volumes:
      - ./src:/app/src:ro

volumes:
  postgres_data:
    driver: local

  pgadmin_data:
    driver: local