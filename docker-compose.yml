services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:18
    container_name: bierapp-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1' -q --no-align --tuples-only"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  # ─── pgAdmin (Web-UI für PostgreSQL) ─────────────────────
  pgadmin:
    image: dpage/pgadmin4:9.13
    container_name: bierapp-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "8081:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ─── Flask-App ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bierapp-flask
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FLASK_HOST: ${FLASK_HOST}
      FLASK_PORT: ${FLASK_PORT}
      FLASK_DEBUG: ${FLASK_DEBUG}
    ports:
      - "${FLASK_PORT}:${FLASK_PORT}"
    volumes:
      - ./src:/app/src:ro

volumes:
  postgres_data:
    driver: local

  pgadmin_data:
    driver: local
  